<!DOCTYPE html>
<html lang="ko">
<head>

<title>KOinUS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ink:#1a1a2e;--indigo:#4F46E5;--il:#EEF2FF;--im:#818CF8;--gold:#F59E0B;--gl:#FFFBEB;--bg:#F1F5F9;--wh:#FFFFFF;--bd:#E2E8F0;--tx:#0F172A;--mu:#64748B;--hn:#94A3B8}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:var(--ink);position:sticky;top:0;z-index:100}
.ht{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px}
.logo{font-size:20px;font-weight:800;color:#fff}
.logo em{color:var(--gold);font-style:normal}
.hs{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.cnt{font-size:12px;font-weight:700;color:var(--gold);background:rgba(245,158,11,.15);padding:4px 10px;border-radius:20px}
.sw{padding:0 16px 12px;display:flex;gap:8px}
.si{flex:1;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;padding:0 12px}
.si input{background:none;border:none;outline:none;color:#fff;font-size:14px;width:100%;padding:10px 0}
.si input::placeholder{color:rgba(255,255,255,.3)}
.so{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:0 14px;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap;height:40px}
.cats{background:var(--wh);border-bottom:1px solid var(--bd);padding:14px}
.ct{font-size:11px;font-weight:700;color:var(--hn);letter-spacing:1px;margin-bottom:10px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cc{display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--wh);cursor:pointer;transition:all .15s}
.cc.on,.cc:hover{border-color:var(--indigo);background:var(--il)}
.ci{font-size:22px;flex-shrink:0;width:24px;text-align:center}
.cinfo{min-width:0}
.cn{font-size:14px;font-weight:700;color:var(--tx);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc.on .cn,.cc:hover .cn{color:var(--indigo)}
.ck{font-size:11px;color:var(--hn);display:block;margin-top:2px}
.cc.on .ck{color:var(--im)}
.cont{padding:10px 12px 90px}
.card{background:var(--wh);border-radius:12px;border:1px solid var(--bd);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .15s}
.card.vip{border-color:var(--gold);background:var(--gl)}
.cico{width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cbody{flex:1;min-width:0}
.nbadges{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.vbadge{background:var(--gold);color:#78350F;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px}
.sbadge{background:var(--il);color:var(--indigo);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.cname{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.caddr{font-size:12px;color:var(--mu);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{display:flex;align-items:center;gap:10px}
.crat{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700}
.st{color:var(--gold)}
.crev{font-size:11px;color:var(--hn);font-weight:400}
.cph{font-size:12px;color:var(--indigo);font-weight:700}
.cright{flex-shrink:0}
.fvbtn{font-size:22px;cursor:pointer;line-height:1}
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55)}
.ov.open{display:flex;align-items:flex-end}
.dv{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:30px}
.dhandle{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:14px auto 0}
.dhead{padding:18px 20px 14px;border-bottom:1px solid var(--bd)}
.dcatbadge{font-size:12px;font-weight:700;color:var(--indigo);background:var(--il);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.dname{font-size:22px;font-weight:800;color:var(--tx);line-height:1.3}
.drat{display:flex;align-items:center;gap:5px;margin-top:8px}
.dstars{color:var(--gold);font-size:16px}
.drnum{font-size:16px;font-weight:700}
.drcnt{font-size:13px;color:var(--hn)}
.dbody{padding:14px 20px}
.irow{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg)}
.irow:last-child{border-bottom:none}
.iico{width:36px;height:36px;border-radius:8px;background:var(--il);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.ilabel{font-size:11px;color:var(--hn);margin-bottom:3px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.ival{font-size:14px;color:var(--tx);line-height:1.6}
.ival a{color:var(--indigo);text-decoration:none;font-weight:600}
.hlist{font-size:13px;color:var(--mu);line-height:2}
.arow{display:flex;gap:8px;padding:16px 20px 0}
.abtn{flex:1;padding:14px 8px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.abtn.call{background:var(--indigo);color:#fff}
.abtn.amap{background:var(--il);color:var(--indigo)}
.abtn.aweb{background:var(--bg);color:var(--mu);border:1px solid var(--bd)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-top:1.5px solid var(--bd);display:flex;justify-content:space-around;padding:10px 0 12px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 24px;opacity:.4}
.ni.on{opacity:1}
.niico svg{width:22px;height:22px;fill:none;stroke:var(--mu);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni.on .niico svg{stroke:var(--indigo)}
.nilbl{font-size:10px;color:var(--mu);font-weight:700}
.ni.on .nilbl{color:var(--indigo)}
.empty{text-align:center;padding:80px 20px;color:var(--hn);font-size:15px}
.bg1{background:#FFF7ED}.bg2{background:#EFF6FF}.bg3{background:#ECFDF5}
.bg4{background:#F5F3FF}.bg5{background:#FFFBEB}.bg6{background:#FDF2F8}
.bg7{background:#F0FDF4}.bg8{background:#F0F9FF}.bg9{background:#F8FAFC}
.bg10{background:#FFF7F0}.bg11{background:#F1F5F9}.bg12{background:#FEF9C3}
</style>
</head>

var CLS={"\uc2dd\ub2f9\u00b7\uce74\ud398":"bg1","\uc758\ub8cc":"bg2","\uce58\uacfc":"bg3","\ubc95\ub960":"bg4","\uc790\ub3d9\ucc28":"bg5","\ubbf8\uc6a9":"bg6","\uad50\uc721":"bg7","\uae08\uc735\u00b7\ubcf4\ud5d8":"bg8","\ucee4\ubba4\ub2c8\ud2f0":"bg9","\ubd80\ub3d9\uc0b0":"bg10","\ub9c8\ud2b8\u00b7\uc2dd\ud488":"bg12","\uc138\ud0c1\uc18c":"bg13","\ud55c\uc758\uc6d0":"bg14","\uae30\ud0c0":"bg11"};
var si=0,curCat=CATS[0],curQ="",showFav=false,favs=[];
try{favs=JSON.parse(localStorage.getItem("gj")||"[]")}catch(e){}
var cg=document.getElementById("cg");
CATS.forEach(function(c){
  var d=document.createElement("div");
  d.className="cc"+(c===CATS[0]?" on":"");
  var s1=document.createElement("span");s1.className="ci";s1.textContent=CICO[c]||"\u{1F4CB}";
  var s2=document.createElement("span");s2.className="cinfo";
  var s3=document.createElement("span");s3.className="cn";s3.textContent=c;
  var s4=document.createElement("span");s4.className="ck";s4.textContent=(CNTS[c]||0)+"\uAC1C";
  s2.appendChild(s3);s2.appendChild(s4);d.appendChild(s1);d.appendChild(s2);
  (function(cat,el){el.addEventListener("click",function(){
    curCat=cat;document.querySelectorAll(".cc").forEach(function(x){x.classList.remove("on")});
    el.classList.add("on");showFav=false;document.getElementById("favNav").classList.remove("on");render();
  })})(c,d);
  cg.appendChild(d);
});
document.getElementById("qi").addEventListener("input",function(){curQ=this.value;render()});
document.getElementById("sortBtn").addEventListener("click",function(){
  si=(si+1)%3;
  this.textContent=["\uD3C9\uC810\uC21C","\uB9AC\uBDF0\uC21C","\uC774\uB984\uC21C"][si];
  render();
});
function getList(){
  var l=D.slice();
  if(showFav){l=l.filter(function(b){return favs.indexOf(b.id)>=0})}
  else{
    if(curCat!==CATS[0])l=l.filter(function(b){return b.cat===curCat});
    if(curQ){var q=curQ.toLowerCase();l=l.filter(function(b){
      return(b.name||"").toLowerCase().indexOf(q)>=0||(b.name_en||"").toLowerCase().indexOf(q)>=0||
             (b.sub||"").indexOf(q)>=0||(b.addr||"").toLowerCase().indexOf(q)>=0;
    })}
  }
  l.sort(function(a,b){
    if(a.vip!==b.vip)return b.vip?1:-1;
    if(si===0)return b.rating-a.rating;
    if(si===1)return b.reviews-a.reviews;
    return(a.name||"").localeCompare(b.name||"","ko");
  });
  return l;
}
function mk(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e}
function render(){
  var l=getList();
  document.getElementById("cnt").textContent=l.length+"\uAC1C";
  var cont=document.getElementById("cont");cont.innerHTML="";
  if(!l.length){cont.appendChild(mk("div","empty","\uAC80\uC0C9 \uACB0\uACFC\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4"));return}
  var frag=document.createDocumentFragment();
  for(var i=0;i<l.length;i++){(function(b){
    var card=mk("div","card"+(b.vip?" vip":""));
    var ico=mk("div","cico "+(CLS[b.cat]||"bg11"),ICONS[b.cat]||"\uD83D\uDCCB");
    var body=mk("div","cbody");
    if(b.vip||b.sub){var bdg=mk("div","nbadges");if(b.vip)bdg.appendChild(mk("span","vbadge","\u2B50 VIP"));if(b.sub)bdg.appendChild(mk("span","sbadge",b.sub));body.appendChild(bdg)}
    body.appendChild(mk("div","cname",b.name||""));
    if(b.addr){var pts=(b.addr||"").split(",");body.appendChild(mk("div","caddr",pts.length>2?pts.slice(0,-2).join(",").trim():b.addr))}
    var meta=mk("div","cmeta");
    if(b.rating>0){var rat=mk("div","crat");rat.innerHTML="<span class=\"st\">\u2605</span>"+b.rating.toFixed(1)+"<span class=\"crev\">("+b.reviews+")</span>";meta.appendChild(rat)}
    if(b.phone)meta.appendChild(mk("span","cph",b.phone));
    body.appendChild(meta);
    var right=mk("div","cright");
    var fv=mk("div","fvbtn",favs.indexOf(b.id)>=0?"\u2665":"\u2661");
    fv.style.color=favs.indexOf(b.id)>=0?"#EF4444":"#CBD5E1";
    fv.addEventListener("click",function(e){e.stopPropagation();tFav(b.id)});
    right.appendChild(fv);card.appendChild(ico);card.appendChild(body);card.appendChild(right);
    card.addEventListener("click",function(){openD(b.id)});
    frag.appendChild(card);
  })(l[i])}
  cont.appendChild(frag);
}
function addRow(parent,ico,label,valFn){var row=mk("div","irow");row.appendChild(mk("div","iico",ico));var c=mk("div");c.appendChild(mk("div","ilabel",label));var v=mk("div","ival");valFn(v);c.appendChild(v);row.appendChild(c);parent.appendChild(row)}
function openD(id){
  var b=D[id];if(!b)return;
  document.getElementById("dcat").textContent=(b.cat||"")+(b.sub?" \u00B7 "+b.sub:"");
  document.getElementById("dname").textContent=b.name||"";
  var dr=document.getElementById("drat");dr.innerHTML="";
  if(b.rating>0){
    dr.appendChild(mk("span","dstars","\u2605".repeat(Math.round(b.rating))));
    dr.appendChild(mk("span","drnum",b.rating.toFixed(1)));
    dr.appendChild(mk("span","drcnt","\uB9AC\uBDF0 "+b.reviews+"\uAC1C"));
  }
  var db=document.getElementById("dbody");db.innerHTML="";
  if(b.addr)addRow(db,"\uD83D\uDCCD","\uC8FC\uC18C",function(v){v.textContent=b.addr});
  if(b.phone)addRow(db,"\uD83D\uDCDE","\uC804\uD654",function(v){var a=mk("a");a.href="tel:"+b.phone;a.textContent=b.phone;v.appendChild(a)});
  if(b.hours)addRow(db,"\uD83D\uDD50","\uC601\uC5C5\uC2DC\uAC04",function(v){v.className="ival hlist";b.hours.split("|").forEach(function(h){v.appendChild(mk("div",null,h.trim()))})});
  if(b.website&&b.website!=="nan")addRow(db,"\uD83C\uDF10","\uC6F9\uC0AC\uC774\uD2B8",function(v){var a=mk("a");a.href=b.website;a.target="_blank";a.textContent="\uBC29\uBB38\uD558\uAE30 \u2192";v.appendChild(a)});
  var ar=document.getElementById("arow");ar.innerHTML="";
  if(b.phone){var b1=mk("button","abtn call","\uD83D\uDCDE \uC804\uD654\uD558\uAE30");b1.addEventListener("click",function(){location.href="tel:"+b.phone});ar.appendChild(b1)}
  if(b.maps){var b2=mk("button","abtn amap","\uD83D\uDDFA\uFE0F \uC9C0\uB3C4\uBCF4\uAE30");b2.addEventListener("click",function(){window.open(b.maps)});ar.appendChild(b2)}
  if(b.website&&b.website!=="nan"){var b3=mk("button","abtn aweb","\uD83C\uDF10 \uD648\uD398\uC774\uC9C0");b3.addEventListener("click",function(){window.open(b.website)});ar.appendChild(b3)}
  document.getElementById("ov").classList.add("open");document.body.style.overflow="hidden";
}
document.getElementById("ov").addEventListener("click",function(e){if(e.target===this){this.classList.remove("open");document.body.style.overflow=""}});
function tFav(id){var i=favs.indexOf(id);if(i>=0)favs.splice(i,1);else favs.push(id);try{localStorage.setItem("gj",JSON.stringify(favs))}catch(e){}document.getElementById("fc").textContent=favs.length?"("+favs.length+")":"";render()}
document.getElementById("favNav").addEventListener("click",function(){showFav=!showFav;this.classList.toggle("on",showFav);render()});
